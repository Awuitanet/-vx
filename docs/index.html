<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pro App</title>
</head>

<body style="text-align:center; font-family:sans-serif; padding-top:50px;">

  <!-- Pregunta 1 -->
  <h2>¿Crees que soy pro? 😎</h2>
  <button onclick="responder('si')">Sí</button>
  <button onclick="responder('no')">No</button>

  <div id="resultado" style="margin-top:30px;"></div>

  <hr style="margin:40px 0; width:80%;">

  <!-- Pregunta 2 -->
  <h2>¿Eres mayor de 14? 🤔</h2>
  <button onclick="responderEdad('si')">Sí</button>
  <button onclick="responderEdad('no')">No</button>

  <div id="resultadoEdad" style="margin-top:30px;"></div>

  <script>
    // Pregunta 1 - ¿Eres pro?
    function responder(opcion) {
      const div = document.getElementById("resultado");

      if (opcion === "si") {
        div.innerHTML = `
          <h3>jejeje like 😎</h3>
          <img src="jeje like.jpeg" width="250">
        `;
      } else {
        div.innerHTML = `
          <h3>💀 ok...</h3>
          <img src="bbae58d9-73a6-4386-93ca-c862d63236fc.jpeg" width="250">
        `;
      }
    }

    // Pregunta 2 - ¿Mayor de 14?
    function responderEdad(opcion) {
      const div = document.getElementById("resultadoEdad");

      if (opcion === "si") {
        div.innerHTML = `
          <h3>¡Bienvenido! 😎👍</h3>
          <img src="70e09c6e-afff-4a7e-ba0c-94e99d94.jpeg" width="250">
        `;
      } else {
        div.innerHTML = `
          <h3>🚫 Acceso restringido</h3>
          <img src=" 2F36dffe84-8dc0-4517-9e26-0896c031ed6d.jpeg " width="250">
        `;
      }
    }
  </script>

</body>
</html>
