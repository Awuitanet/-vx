<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pro App - Album Compartido</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: white;
    }
    .hidden { display: none !important; }

    .card {
      background: rgba(255,255,255,0.95);
      color: #333;
      border-radius: 20px;
      padding: 30px;
      max-width: 600px;
      margin: 20px auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    h2 { margin-top: 0; color: #333; }

    button {
      padding: 12px 25px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: #667eea;
      color: white;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    button:active { transform: scale(0.95); }

    .btn-si { background: #28a745; }
    .btn-no { background: #dc3545; }

    input[type="text"], input[type="password"], input[type="file"] {
      padding: 12px;
      margin: 8px;
      font-size: 16px;
      border-radius: 10px;
      border: 2px solid #ddd;
      width: 80%;
      max-width: 300px;
    }

    #error { color: #dc3545; margin-top: 10px; font-weight: bold; }

    .album {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .album img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s;
    }
    .album img:hover { transform: scale(1.05); }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 15px;
      padding: 30px;
      margin: 20px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .upload-area:hover {
      background: rgba(102, 126, 234, 0.1);
    }

    .foto-item {
      position: relative;
    }
    .foto-item .usuario {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    #uploadStatus {
      min-height: 24px;
      margin: 10px 0;
    }

    hr {
      border: none;
      height: 2px;
      background: linear-gradient(90deg, transparent, #667eea, transparent);
      margin: 30px auto;
      width: 80%;
    }
  </style>
</head>

<body>

  <!-- PREGUNTA 1 -->
  <div id="pregunta" class="card">
    <h2>¿Crees que soy pro? </h2>
    <button class="btn-si" onclick="responder('si')">Sí</button>
    <button class="btn-no" onclick="responder('no')">No</button>
  </div>

  <div id="resultado" style="margin-top:20px;"></div>

  <!-- LOGIN -->
  <div id="login" class="card hidden">
    <h2>🔒 Acceso al Album</h2>
    <input type="text" id="user" placeholder="Usuario"><br>
    <input type="password" id="pass" placeholder="Contraseña"><br>
    <button onclick="verificarLogin()">Entrar</button>
    <div id="error"></div>
  </div>

  <!-- ALBUM -->
  <div id="album" class="card hidden">
    <h2>📸 Album Compartido</h2>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
      <p>📤 Toca aquí para subir foto</p>
      <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="subirFoto(this)">
    </div>
    <div id="uploadStatus"></div>

    <div id="galeria" class="album"></div>

    <button onclick="cerrarSesion()" style="margin-top:20px; background:#6c757d;">Cerrar sesión</button>
  </div>

  <script>
    // ═══════════════════════════════════════════════════
    // CONFIGURACIÓN
    // ═══════════════════════════════════════════════════
    const CONFIG = {
      REPO_OWNER: 'Awuitanet',
      REPO_NAME: '-vx',
      ISSUE_NUMBER: 1,
      IMGUR_CLIENT_ID: '546c25a59c58ad7',
      API_ENDPOINT: 'https://album-api-proxy.vercel.app/api/upload'  // Tu servidor Vercel
    };

    // ═══════════════════════════════════════════════════
    // FUNCIONES DE LA APP
    // ═══════════════════════════════════════════════════

    function responder(opcion) {
      const div = document.getElementById("resultado");
      const login = document.getElementById("login");

      if (opcion === "si") {
        div.innerHTML = '<div class="card"><h3>¡Correcto! 😎 Ahora inicia sesión</h3></div>';
        login.classList.remove("hidden");
        document.getElementById("pregunta").classList.add("hidden");
      } else {
        div.innerHTML = `
          <div class="card">
            <h3>💀 ok...</h3>
            <img src="docs/bbae58d9-73a6-4386-93ca-c862d63236fc.jpeg" width="250" style="border-radius:15px;">
          </div>
        `;
      }
    }

    function verificarLogin() {
      const user = document.getElementById("user").value.trim();
      const pass = document.getElementById("pass").value.trim();
      const error = document.getElementById("error");

      if (user === "papulandia" && pass === "20") {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("album").classList.remove("hidden");
        document.getElementById("resultado").classList.add("hidden");
        cargarFotos();
        error.textContent = "";
      } else {
        error.textContent = "❌ Usuario o contraseña incorrectos";
      }
    }

    function cerrarSesion() {
      document.getElementById("album").classList.add("hidden");
      document.getElementById("pregunta").classList.remove("hidden");
      document.getElementById("resultado").innerHTML = "";
      document.getElementById("user").value = "";
      document.getElementById("pass").value = "";
    }

    // ═══════════════════════════════════════════════════
    // SUBIR FOTO: Imgur → Backend Proxy → GitHub
    // ═══════════════════════════════════════════════════

    async function subirFoto(input) {
      const file = input.files[0];
      if (!file) return;

      if (!file.type.startsWith('image/')) {
        mostrarStatus("❌ Solo se permiten imágenes", "error");
        return;
      }

      if (file.size > 5 * 1024 * 1024) {
        mostrarStatus("❌ La imagen es muy grande (máx 5MB)", "error");
        return;
      }

      mostrarStatus("⏳ Subiendo a Imgur...", "info");

      try {
        const formData = new FormData();
        formData.append('image', file);

        const imgurResponse = await fetch('https://api.imgur.com/3/image', {
          method: 'POST',
          headers: {
            'Authorization': `Client-ID ${CONFIG.IMGUR_CLIENT_ID}`
          },
          body: formData
        });

        const imgurData = await imgurResponse.json();

        if (!imgurData.success) {
          throw new Error(imgurData.data?.error || 'Error subiendo a Imgur');
        }

        const imageUrl = imgurData.data.link;
        const deleteHash = imgurData.data.deletehash;

        mostrarStatus("⏳ Guardando en GitHub...", "info");

        const commentBody = `📷 **Foto subida por papulandia**\n\n![Foto](${imageUrl})\n\n<!-- imgur:${deleteHash} -->`;

        // Usar servidor proxy (seguro y confiable)
        const proxyResponse = await fetch(CONFIG.API_ENDPOINT, {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({
            comment_body: commentBody
          })
        });

        if (!proxyResponse.ok) {
          const errorData = await proxyResponse.json();
          throw new Error(errorData.error || 'Error guardando en GitHub');
        }

        mostrarStatus("✅ ¡Foto subida correctamente!", "success");
        input.value = '';
        cargarFotos();
        setTimeout(() => mostrarStatus("", "info"), 3000);

      } catch (err) {
        console.error('Error:', err);
        mostrarStatus(`❌ Error: ${err.message}`, "error");
      }
    }

    // ═══════════════════════════════════════════════════
    // CARGAR FOTOS: Leer comentarios del Issue
    // ═══════════════════════════════════════════════════

    async function cargarFotos() {
      const galeria = document.getElementById("galeria");
      galeria.innerHTML = "<p>🔄 Cargando fotos...</p>";

      try {
        const response = await fetch(
          `https://api.github.com/repos/${CONFIG.REPO_OWNER}/${CONFIG.REPO_NAME}/issues/${CONFIG.ISSUE_NUMBER}/comments`,
          {
            headers: {
              'Accept': 'application/vnd.github.v3+json'
            }
          }
        );

        if (!response.ok) {
          if (response.status === 404) {
            throw new Error('El Issue #1 no existe. Créalo primero en GitHub.');
          }
          throw new Error(`Error ${response.status}: ${response.statusText}`);
        }

        const comments = await response.json();

        const fotos = [];
        comments.forEach(comment => {
          const imgurRegex = /https:\/\/i\.imgur\.com\/[a-zA-Z0-9]+\.(jpg|jpeg|png|gif)/gi;
          const matches = comment.body.match(imgurRegex);

          if (matches && matches.length > 0) {
            fotos.push({
              url: matches[0],
              usuario: 'papulandia',
              fecha: new Date(comment.created_at).toLocaleDateString()
            });
          }
        });

        if (fotos.length === 0) {
          galeria.innerHTML = "<p>📭 No hay fotos aún. ¡Sé el primero!</p>";
          return;
        }

        galeria.innerHTML = "";
        fotos.reverse().forEach(foto => {
          galeria.innerHTML += `
            <div class="foto-item">
              <img src="${foto.url}" alt="Foto" loading="lazy" onerror="this.parentElement.style.display='none'">
              <div class="usuario">📷 ${foto.usuario} · ${foto.fecha}</div>
            </div>
          `;
        });

      } catch (err) {
        galeria.innerHTML = `<p style="color:red;">❌ ${err.message}</p>`;
        console.error(err);
      }
    }

    function mostrarStatus(mensaje, tipo) {
      const status = document.getElementById("uploadStatus");
      const colores = { info: "#333", success: "#28a745", error: "#dc3545" };
      status.innerHTML = mensaje ? `<p style="color:${colores[tipo] || '#333'}; font-weight:bold;">${mensaje}</p>` : "";
    }

    setInterval(() => {
      if (!document.getElementById("album").classList.contains("hidden")) {
        cargarFotos();
      }
    }, 30000);

  </script>

</body>
</html>
