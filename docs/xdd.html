<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pro App - Album Compartido</title>
  <style>
    body {
      text-align: center;
      font-family: sans-serif;
      padding: 20px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      color: white;
    }
    .hidden { display: none !important; }

    .card {
      background: rgba(255,255,255,0.95);
      color: #333;
      border-radius: 20px;
      padding: 30px;
      max-width: 600px;
      margin: 20px auto;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
    }

    h2 { margin-top: 0; color: #333; }

    button {
      padding: 12px 25px;
      margin: 8px;
      font-size: 16px;
      cursor: pointer;
      border-radius: 10px;
      border: none;
      background: #667eea;
      color: white;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    button:active { transform: scale(0.95); }

    .btn-si { background: #28a745; }
    .btn-no { background: #dc3545; }

    input[type="text"], input[type="password"], input[type="file"] {
      padding: 12px;
      margin: 8px;
      font-size: 16px;
      border-radius: 10px;
      border: 2px solid #ddd;
      width: 80%;
      max-width: 300px;
    }

    #error { color: #dc3545; margin-top: 10px; font-weight: bold; }

    .album {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      padding: 20px;
    }

    .album img {
      width: 100%;
      height: 150px;
      object-fit: cover;
      border-radius: 15px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.2);
      transition: transform 0.3s;
      cursor: pointer;
    }
    .album img:hover { transform: scale(1.05); }

    .upload-area {
      border: 3px dashed #667eea;
      border-radius: 15px;
      padding: 30px;
      margin: 20px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .upload-area:hover {
      background: rgba(102, 126, 234, 0.1);
    }

    .foto-item {
      position: relative;
    }
    .foto-item .usuario {
      font-size: 12px;
      color: #666;
      margin-top: 5px;
    }

    hr {
      border: none;
      height: 2px;
      background: linear-gradient(90deg, transparent, #667eea, transparent);
      margin: 30px auto;
      width: 80%;
    }

    .loading { color: #667eea; font-weight: bold; }
    .success { color: green; font-weight: bold; }
    .error-msg { color: red; font-weight: bold; }
  </style>
</head>

<body>

  <!-- PREGUNTA 1 -->
  <div id="pregunta" class="card">
    <h2>¿Crees que soy pro? 😎</h2>
    <button class="btn-si" onclick="responder('si')">Sí</button>
    <button class="btn-no" onclick="responder('no')">No</button>
  </div>

  <div id="resultado" style="margin-top:20px;"></div>

  <!-- LOGIN -->
  <div id="login" class="card hidden">
    <h2>🔒 Acceso al Album</h2>
    <input type="text" id="user" placeholder="Usuario"><br>
    <input type="password" id="pass" placeholder="Contraseña"><br>
    <button onclick="verificarLogin()">Entrar</button>
    <div id="error"></div>
  </div>

  <!-- ALBUM -->
  <div id="album" class="card hidden">
    <h2>📸 Album Compartido</h2>

    <div class="upload-area" onclick="document.getElementById('fileInput').click()" title="Haz clic para seleccionar una foto">
      <p>📤 Toca aquí para subir foto</p>
      <input type="file" id="fileInput" accept="image/*" class="hidden" onchange="subirFoto(this)">
    </div>
    <div id="uploadStatus"></div>

    <div id="galeria" class="album"></div>

    <button onclick="cerrarSesion()" style="margin-top:20px; background:#6c757d;">Cerrar sesión</button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ⚠️ IMPORTANTE: Estas credenciales deben ser variables de entorno
    // En producción, usa: const SUPABASE_URL = process.env.VITE_SUPABASE_URL;
    const SUPABASE_URL = 'https://jyzeizbxmniuuwcycdjw.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imp5emVpemJ4bW5pdXV3Y3ljZGp3Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTA2MTgwMDAsImV4cCI6MjA2NjE5NDAwMH0.sb_p[...]';

    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    let usuarioActual = null;
    let suscripcionRealtime = null;

    // ✅ MEJORA 1: Evitar recargas innecesarias con Realtime
    function iniciarRealtime() {
      if (suscripcionRealtime) return;
      
      suscripcionRealtime = supabaseClient
        .channel('public:Papus')
        .on('postgres_changes', { event: '*', schema: 'public', table: 'Papus' }, (payload) => {
          console.log('Cambio detectado en la galería:', payload);
          cargarFotos();
        })
        .subscribe();
    }

    function detenerRealtime() {
      if (suscripcionRealtime) {
        suscripcionRealtime.unsubscribe();
        suscripcionRealtime = null;
      }
    }

    function responder(opcion) {
      const div = document.getElementById("resultado");
      const login = document.getElementById("login");

      if (opcion === "si") {
        div.innerHTML = '<div class="card"><h3>¡Correcto! 😎 Ahora inicia sesión</h3></div>';
        login.classList.remove("hidden");
        document.getElementById("pregunta").classList.add("hidden");
      } else {
        div.innerHTML = `
          <div class="card">
            <h3>💀 ok...</h3>
            <img src="bbae58d9-73a6-4386-93ca-c862d63236fc.jpeg" width="250" style="border-radius:15px;" alt="Reacción">
          </div>
        `;
      }
    }

    // ✅ MEJORA 2: Validación más robusta
    async function verificarLogin() {
      const user = document.getElementById("user").value.trim();
      const pass = document.getElementById("pass").value.trim();
      const error = document.getElementById("error");

      // Validación básica de cliente
      if (!user || !pass) {
        error.textContent = "❌ Usuario y contraseña requeridos";
        return;
      }

      // ⚠️ IMPORTANTE: En producción, esto debe validarse en el backend
      // Aquí solo usamos credenciales de demostración
      if (user === "papulandia" && pass === "20") {
        usuarioActual = user;
        document.getElementById("login").classList.add("hidden");
        document.getElementById("album").classList.remove("hidden");
        document.getElementById("resultado").classList.add("hidden");
        cargarFotos();
        iniciarRealtime();
        error.textContent = "";
      } else {
        error.textContent = "❌ Usuario o contraseña incorrectos";
      }
    }

    function cerrarSesion() {
      usuarioActual = null;
      detenerRealtime();
      document.getElementById("album").classList.add("hidden");
      document.getElementById("pregunta").classList.remove("hidden");
      document.getElementById("resultado").innerHTML = "";
      document.getElementById("user").value = "";
      document.getElementById("pass").value = "";
      document.getElementById("fileInput").value = "";
    }

    // ✅ MEJORA 3: Validación de archivo antes de subir
    async function subirFoto(input) {
      const file = input.files[0];
      if (!file) return;

      // Validar tipo de archivo
      if (!file.type.startsWith('image/')) {
        alert('❌ Por favor selecciona una imagen válida');
        return;
      }

      // Validar tamaño (máximo 5MB)
      if (file.size > 5 * 1024 * 1024) {
        alert('❌ La imagen es muy grande (máximo 5MB)');
        return;
      }

      const status = document.getElementById("uploadStatus");
      status.innerHTML = "<p class='loading'>⏳ Subiendo...</p>";

      try {
        const nombreArchivo = Date.now() + '_' + file.name;

        const { data: uploadData, error: uploadError } = await supabaseClient
          .storage
          .from('album fotos')
          .upload(nombreArchivo, file);

        if (uploadError) throw uploadError;

        const { data: { publicUrl } } = supabaseClient
          .storage
          .from('album fotos')
          .getPublicUrl(nombreArchivo);

        // ✅ MEJORA 4: Usar usuario autenticado en lugar de hardcodeado
        const { error: dbError } = await supabaseClient
          .from('Papus')
          .insert([{ 
            Url: publicUrl, 
            Usuario: usuarioActual || 'papulandia',
            nombre_archivo: nombreArchivo 
          }]);

        if (dbError) throw dbError;

        status.innerHTML = "<p class='success'>✅ ¡Foto subida exitosamente!</p>";
        document.getElementById("fileInput").value = "";
        
        setTimeout(() => status.innerHTML = "", 3000);

      } catch (err) {
        console.error('Error al subir foto:', err);
        status.innerHTML = "<p class='error-msg'>❌ Error: " + (err.message || 'Error desconocido') + "</p>";
      }
    }

    // ✅ MEJORA 5: Prevenir XSS usando createElement en lugar de innerHTML
    async function cargarFotos() {
      const galeria = document.getElementById("galeria");
      galeria.innerHTML = "<p class='loading'>Cargando fotos...</p>";

      try {
        const { data: fotos, error } = await supabaseClient
          .from('Papus')
          .select('*')
          .order('created_at', { ascending: false });

        if (error) throw error;

        if (fotos.length === 0) {
          galeria.innerHTML = "<p>📭 No hay fotos aún. ¡Sé el primero!</p>";
          return;
        }

        galeria.innerHTML = "";
        
        fotos.forEach(foto => {
          const fotoItem = document.createElement('div');
          fotoItem.className = 'foto-item';

          const img = document.createElement('img');
          img.src = foto.Url;
          img.alt = `Foto de ${foto.Usuario}`;
          img.onerror = function() { this.style.display = 'none'; };
          
          const usuarioDiv = document.createElement('div');
          usuarioDiv.className = 'usuario';
          usuarioDiv.textContent = `📷 ${foto.Usuario}`;

          fotoItem.appendChild(img);
          fotoItem.appendChild(usuarioDiv);
          galeria.appendChild(fotoItem);
        });

      } catch (err) {
        galeria.innerHTML = "<p class='error-msg'>❌ Error cargando fotos</p>";
        console.error('Error:', err);
      }
    }

    // ✅ MEJORA 6: Limpiar al descargar la página
    window.addEventListener('beforeunload', () => {
      detenerRealtime();
    });

    // ⚠️ NOTA: El setInterval anterior fue reemplazado por Realtime
    // Esto reduce significativamente el tráfico de red
  </script>

</body>
</html>
